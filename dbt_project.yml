# ============================================================================
# og_hub — the HUB dbt project (dbt Mesh).
#   staging  -> OG_<ENV>_DB.STAGING        (typed/cleaned, deduped)
#   marts    -> OG_<ENV>_DB.MARTS_REVOPS   (business marts; mart_revops__pipeline
#               is a PUBLIC model a domain SPOKE repo consumes cross-project)
# Runs on Snowflake's native dbt feature as REVOPS_DEVELOPER. A future spoke
# repo reads MARTS_REVOPS (read-only) and writes its own MARTS_<domain>.
# ============================================================================

name: "og_hub"
version: "1.0.0"
config-version: 2

profile: "og_hub"

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]

models:
  og_hub:
    staging:
      +schema: STAGING
      # Incremental + MERGE: only new/changed source rows are processed each run
      # (CDC), upserted on the model's unique_key. First run builds full; later
      # runs merge the delta. unique_key + CDC column are set per model.
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: append_new_columns
      # Re-apply column tags on staging (now tables) — governance explicit per
      # model, so a cast can never silently drop masking.
      +post-hook: "{{ apply_column_tags() }}"
    marts:
      +schema: MARTS_REVOPS
      +materialized: table
      # Apply Snowflake column tags (meta.pii_tag in _models.yml) right after
      # each mart builds — governance travels RAW -> marts. No-op in dev / when
      # no column declares a tag. Needs REVOPS_DEVELOPER to hold APPLY TAG.
      +post-hook: "{{ apply_column_tags() }}"
