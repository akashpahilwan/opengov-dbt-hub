version: 2

models:
  - name: mart_revops__pipeline
    description: >
      RevOps pipeline mart — opportunities enriched with account context and
      measures (days_to_close, pipeline_stage_bucket, weighted_amount).
      PUBLIC dbt Mesh model: domain spoke projects reference it cross-project
      (read-only) and build their own MARTS_<domain>.
    access: public
    config:
      # Deployment (preprod/prod) object name via generate_alias_name:
      #   preprod/prod -> MARTS_REVOPS.REVOPS_PIPELINE (stable public name a spoke refs)
      #   dev          -> <sandbox>.mart_revops__pipeline (model name, per macro)
      alias: revops_pipeline
      contract:
        enforced: true
    columns:
      - name: opportunity_id
        data_type: varchar
        tests: [not_null, unique]
      - name: account_id
        data_type: varchar
      - name: account_name
        data_type: varchar
      - name: industry
        data_type: varchar
      - name: customer_tier
        data_type: varchar
      - name: billing_state
        data_type: varchar
      - name: owner_id
        data_type: varchar
      - name: stage_name
        data_type: varchar
      - name: amount
        data_type: number(18,2)
        description: Deal value — financial PII, masked below REVOPS_ADMIN.
        meta:
          pii_tag: { name: PII_FINANCIAL, value: amount }
      - name: close_date
        data_type: date
      - name: created_date
        data_type: timestamp_ntz
      - name: days_to_close
        data_type: number
      - name: pipeline_stage_bucket
        data_type: varchar
        tests:
          - accepted_values:
              values: ['Early Stage', 'Late Stage', 'Closed']
      - name: weighted_amount
        data_type: number(18,2)
        description: Forecast $ (amount x win prob) — financial PII, masked below REVOPS_ADMIN.
        meta:
          pii_tag: { name: PII_FINANCIAL, value: amount }

  - name: mart_revops__tag_demo
    description: >
      Demo model — shows dbt applying a Snowflake column tag during build.
      revenue_amount is classified PII_FINANCIAL, so the apply_column_tags
      post-hook tags it and the masking policy hides it from non-admins.
    columns:
      - name: demo_id
        data_type: number
      - name: revenue_amount
        data_type: number(18,2)
        description: Sensitive financial figure — masked below REVOPS_ADMIN via the tag.
        meta:
          pii_tag: { name: PII_FINANCIAL, value: arr }
